---
- name: Create caddy system user
  user:
    name: caddy
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/caddy
    create_home: true

- name: Create /etc/caddy directory
  file:
    path: /etc/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: "0750"

- name: Download Caddy with googleclouddns and rfc2136 plugins
  get_url:
    url: "https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com%2Fcaddy-dns%2Fgoogleclouddns&p=github.com%2Fcaddy-dns%2Frfc2136"
    dest: /usr/local/bin/caddy
    mode: "0755"
    timeout: 120
    force: true

- name: Deploy Caddy secrets env file
  template:
    src: caddy-secrets.env.j2
    dest: /etc/caddy/caddy-secrets.env
    owner: caddy
    group: caddy
    mode: "0640"
  notify: restart caddy

- name: Deploy GCP service account key for DNS-01
  copy:
    content: "{{ caddy_gcp_sa_key | b64decode }}"
    dest: /etc/caddy/gcp-sa.json
    owner: caddy
    group: caddy
    mode: "0600"

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: caddy
    group: caddy
    mode: "0640"
  notify: reload caddy

- name: Deploy caddy systemd unit
  template:
    src: caddy.service.j2
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify:
    - reload systemd
    - restart caddy

- name: Enable and start caddy
  service:
    name: caddy
    state: started
    enabled: true
